<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MozMarket</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="nav">
    <h2>MozMarket</h2>

    <div id="nav-auth">
      <button onclick="showLogin()">Entrar</button>
      <button onclick="showRegister()">Registar</button>
    </div>

    <div id="nav-user" style="display:none;">
      <span id="user-email"></span>
      <button onclick="logoutUser()">Sair</button>
    </div>
  </nav>

  <!-- LOGIN / REGISTER -->
  <div class="auth-box">
    <h2 id="auth-title">Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Senha">

    <button onclick="loginUser()">Entrar</button>
    <button onclick="registerUser()">Criar Conta</button>
  </div>

  <!-- APP AREA -->
  <div class="app">
    <h3>Produtos</h3>

    <button onclick="addProduct()">Adicionar Produto</button>
    <button onclick="loadProducts()">Carregar Produtos</button>

    <ul id="products-list"></ul>
  </div>

  <!-- JS -->
  <script>
    const SUPABASE_URL = "COLOCA_AQUI_URL";
    const SUPABASE_KEY = "COLOCA_AQUI_KEY";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ================= AUTH =================

    async function registerUser(){
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signUp({ email, password });

      if(error){
        alert(error.message);
      } else {
        alert("Conta criada!");
      }
    }

    async function loginUser(){
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if(error){
        alert(error.message);
      } else {
        updateUI(data.user);
      }
    }

    async function logoutUser(){
      await supabase.auth.signOut();
      updateUI(null);
    }

    // ================= UI =================

    function updateUI(user){
      const navAuth = document.getElementById("nav-auth");
      const navUser = document.getElementById("nav-user");
      const userEmail = document.getElementById("user-email");

      if(user){
        navAuth.style.display = "none";
        navUser.style.display = "block";
        userEmail.innerText = user.email;
      } else {
        navAuth.style.display = "block";
        navUser.style.display = "none";
      }
    }

    function showLogin(){
      document.getElementById("auth-title").innerText = "Login";
    }

    function showRegister(){
      document.getElementById("auth-title").innerText = "Registar";
    }

    // ================= PRODUCTS =================

    async function addProduct(){
      const user = (await supabase.auth.getUser()).data.user;

      if(!user){
        alert("Precisas estar logado!");
        return;
      }

      const { error } = await supabase.from("products").insert({
        name: "Produto Teste",
        price: 100,
        created_by: user.id
      });

      if(error){
        alert(error.message);
      } else {
        alert("Produto adicionado!");
      }
    }

    async function loadProducts(){
      const list = document.getElementById("products-list");

      const { data, error } = await supabase
        .from("products")
        .select("*");

      if(error){
        alert(error.message);
        return;
      }

      list.innerHTML = "";

      data.forEach(p => {
        const li = document.createElement("li");
        li.innerText = p.name + " - " + p.price + " MZN";
        list.appendChild(li);
      });
    }

    // ================= INIT =================

    async function checkUser(){
      const { data } = await supabase.auth.getUser();
      updateUI(data.user);
    }

    checkUser();

  </script>

</body>
</html>
